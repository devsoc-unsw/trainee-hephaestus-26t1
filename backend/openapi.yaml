openapi: 3.1.0
info:
  title: Termful Backend
  description: The backend for team Hephaestus' Termful project
  version: 1.0.0
servers:
  - url: "https://termful-api.up.railway.app"
paths:
  /users/{userId}:
    get:
      tags:
        - Users
      summary: Fetch a user using their ID.
      description: Fetch a Termful user's profile using their ID.
      parameters:
        - name: userId
          in: path
          description: The user's ID.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User with given ID not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      security:
        - cookieAuth: [ ]
      tags:
        - Users
      summary: Modify a user with a given ID.
      description: Modify a Termful user's profile using their ID.
      parameters:
        - name: userId
          in: path
          description: The user's ID.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "204":
          description: Successfully updated room.
        "401":
          description: Not Authorised.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User does not have the permission to edit this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User with given ID not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid fields provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /courses/{term}:
    get:
      tags:
        - Courses
      summary: Get the courses for a user's term.
      description: Fetch a Termful user's courses for a given term.
      parameters:
        - name: term
          in: path
          description: The term to fetch the courses the user is enrolled in.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: string
        "401":
          description: Not Authorised.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Term with given name not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      security:
        - cookieAuth: [ ]
      tags:
        - Courses
      summary: Add a new course to the specified term.
      description: Add a new course to the current Termful user's specified term.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreate"
      responses:
        "201":
          description: Successfully added course.
        "401":
          description: Not Authorised.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid fields provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: betterauth.session_token
    internalApiKey:
      description: Bearer token using internal API key
      type: http
      scheme: Bearer

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: [ string, "null" ]
        year:
          type: [ integer, "null" ]
        major:
          type: [ string, "null" ]
      required:
        - id
        - name
        - avatarUrl
        - year
        - major
      example:
        id: "12345676543245"
        username: horizell
        displayName: Horizell

    UserPatch:
      type: object
      properties:
        name:
          type: string
        year:
          type: [ integer, "null" ]
        major:
          type: [ string, "null" ]
      example:
        year: 1
        major: Computer Science

    CourseCreate:
      type: object
      properties:
        name:
          type: string
      example:
        name: COMP6080 - Front End Web Development
    
    Error:
      type: object
      properties:
        code:
          type: integer
          format: i32
        message:
          type: string
      example:
        code: 404
        message: User not found.

tags:
  - name: Users
    description: Routes relating to Termful users.
  - name: Courses
    description: Routes relating to Termful courses.