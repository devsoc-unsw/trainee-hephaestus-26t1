services:
  db:
    container_name: hephaestus-db
    image: postgres:17.7

    restart: unless-stopped

    ports:
      - "5432:5432"

    volumes:
      - hephaestus-postgres-data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hephaestus

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d hephaestus" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hephaestus-postgres-data: